# evals/datasets/edge/edge-cases.yaml
# Edge Set: Boundary and Edge Cases
# 30 cases covering known weak points and boundary conditions
dataset_id: edge-phoenix-v1
size: 20
created: "2026-06-27"
category: edge_cases

cases:
  # ── Input Boundaries ──
  - id: eg-001
    category: empty_input
    name: empty-message
    description: Empty message should not crash the agent
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: worker
          name: "Edge Worker"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: ""
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      no_server_error: true
      expected_behavior: "Friendly prompt asking for valid input"

  - id: eg-002
    category: whitespace_input
    name: whitespace-only-message
    description: Whitespace-only message should be handled gracefully
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: worker
          name: "WS Worker"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "   \n\t  \n  "
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      no_server_error: true

  - id: eg-003
    category: ultra_long_input
    name: hundred-k-char-input
    description: 100,000 character input stress test
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: worker
          name: "Stress Worker"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "{{generate_long_text:100000}}"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      no_server_error: true
      max_response_time: 60000

  - id: eg-004
    category: special_characters
    name: unicode-emoji-input
    description: Unicode emoji and special characters
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: assistant
          name: "Unicode Agent"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Hello! Please respond with a message containing emojis and special chars like @#$%^&*(){}[]|\\:;\"'<>?/~`"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      no_server_error: true
      response_not_empty: true

  - id: eg-005
    category: binary_content
    name: base64-garbage-input
    description: Random base64-like string should not crash
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: worker
          name: "Binary Worker"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "SGVsbG8gV29ybGQh== dGhpcyBpcyBhIHRlc3Q="
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      no_server_error: true

  # ── Concurrency ──
  - id: eg-006
    category: concurrent_agents
    name: five-simultaneous-agents
    description: 5 agents created simultaneously should all succeed
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: worker
          name: "Worker A"
        save: agent_a_id
      - action: create_agent
        params:
          role: worker
          name: "Worker B"
        save: agent_b_id
      - action: create_agent
        params:
          role: worker
          name: "Worker C"
        save: agent_c_id
      - action: create_agent
        params:
          role: worker
          name: "Worker D"
        save: agent_d_id
      - action: create_agent
        params:
          role: worker
          name: "Worker E"
        save: agent_e_id
    expected:
      all_agents_created: true
      all_agents_unique: true

  - id: eg-007
    category: concurrent_messages
    name: rapid-fire-messages
    description: Multiple messages sent rapidly to same group
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: assistant
          name: "Rapid Agent"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Message 1: What is Python?"
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Message 2: What is JavaScript?"
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Message 3: What is Rust?"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      no_server_error: true

  # ── Agent Lifecycle ──
  - id: eg-008
    category: duplicate_roles
    name: same-role-multiple-times
    description: Creating multiple agents with the same role should work
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: worker
          name: "Worker 1"
        save: agent_a_id
      - action: create_agent
        params:
          role: worker
          name: "Worker 2"
        save: agent_b_id
      - action: create_agent
        params:
          role: worker
          name: "Worker 3"
        save: agent_c_id
    expected:
      all_agents_created: true
      all_agents_unique: true

  - id: eg-009
    category: long_role_name
    name: extremely-long-role-name
    description: Agent with an unusually long role name
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: "senior_full_stack_developer_specializing_in_distributed_systems_and_microservices_architecture"
          name: "Specialist"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Hello"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      no_server_error: true

  - id: eg-010
    category: rapid_create_delete
    name: rapid-create-and-recreate
    description: Create agent, then create another with same name
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: worker
          name: "Duplicate Name Agent"
        save: agent_a_id
      - action: create_agent
        params:
          role: specialist
          name: "Duplicate Name Agent"
        save: agent_b_id
    expected:
      no_server_error: true

  # ── Message Boundaries ──
  - id: eg-011
    category: message_to_nonexistent
    name: message-to-invalid-group
    description: Sending message to non-existent group should return error
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: send_message
        params:
          group_id: "non-existent-group-id"
          message: "This should fail gracefully"
    expected:
      no_server_error: true

  - id: eg-012
    category: empty_group
    name: group-with-only-human
    description: Group with only the human agent, no AI agents
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_group
        params:
          member_ids: ["{{human_agent_id}}"]
        save: group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Hello, is anyone here?"
    expected:
      no_server_error: true

  - id: eg-013
    category: multi_language_input
    name: chinese-japanese-mixed-input
    description: Mixed CJK language input
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: assistant
          name: "Multilingual Agent"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "请用中文回答：什么是微服务架构？そして、その利点は何ですか？"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      response_not_empty: true
      no_server_error: true

  - id: eg-014
    category: code_input
    name: large-code-block-input
    description: Sending a large code block as input
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: reviewer
          name: "Code Reviewer"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Review this code:\n```python\n{{generate_code_block:200}}\n```"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      response_not_empty: true
      no_server_error: true

  - id: eg-015
    category: workflow_stress
    name: many-tasks-workflow
    description: Workflow with 10 tasks, complex dependency chain
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: coordinator
          name: "Stress Coordinator"
        save: agent_id, group_id
      - action: create_workflow
        params:
          tasks:
            - title: "Task A"
              assigneeRole: worker
            - title: "Task B"
              assigneeRole: worker
            - title: "Task C"
              assigneeRole: worker
              dependsOn: ["Task A"]
            - title: "Task D"
              assigneeRole: worker
              dependsOn: ["Task A"]
            - title: "Task E"
              assigneeRole: specialist
              dependsOn: ["Task B", "Task C"]
            - title: "Task F"
              assigneeRole: worker
              dependsOn: ["Task D"]
        save: workflow_id
      - action: activate_workflow
        params:
          workflow_id: "{{workflow_id}}"
    expected:
      workflow_created: true
      no_server_error: true

  # ── Context Compression ──
  - id: eg-016
    category: long_conversation
    name: twenty-turn-conversation
    description: 20+ turn conversation tests context compression
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: assistant
          name: "Long Chat Agent"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Turn 1: What is machine learning?"
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Turn 2: How does deep learning differ?"
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Turn 3: What about reinforcement learning?"
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Turn 4: Can you summarize what we discussed so far?"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      response_not_empty: true
      response_mentions: ["machine learning", "deep learning", "reinforcement"]

  - id: eg-017
    category: rapid_context_switch
    name: topic-switching
    description: Rapidly switching topics in conversation
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: assistant
          name: "Switcher"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Tell me about Python programming"
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Now tell me about ancient Roman history"
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Actually, what's the best way to cook pasta?"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      response_not_empty: true
      no_server_error: true

  # ── Error Recovery ──
  - id: eg-018
    category: recovery_after_error
    name: agent-survives-bad-request
    description: Agent should continue functioning after receiving an invalid request
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: worker
          name: "Resilient Worker"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: ""
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Now please respond normally: what is 3 + 4?"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      response_not_empty: true
      response_mentions: ["7", "seven"]

  - id: eg-019
    category: markdown_heavy_input
    name: markdown-rich-input
    description: Input with heavy markdown formatting
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: editor
          name: "MD Editor"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Please edit this:\n\n# Title\n\n## Section 1\n\n| Col A | Col B |\n|-------|-------|\n| 1 | 2 |\n\n> Blockquote here\n\n```js\nconsole.log('hi')\n```"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      response_not_empty: true
      no_server_error: true

  - id: eg-020
    category: numeric_input
    name: pure-numeric-message
    description: Pure numeric input
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: assistant
          name: "Numeric Agent"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "42"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      no_server_error: true
      response_not_empty: true
