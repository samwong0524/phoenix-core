# evals/datasets/golden/tool-usage.yaml
# Golden Set: Agent Tool Usage
# Tests that agents select and use the correct tools for tasks
dataset_id: golden-tool-usage-v1
size: 15
created: "2026-06-27"
category: tool_usage

cases:
  # ── Bash Tool ──
  - id: tu-001
    name: bash-echo-command
    description: Agent uses bash tool for echo command
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: worker
          name: "Shell Worker"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Run this command: echo 'hello world'"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      response_not_empty: true
      response_mentions: ["hello world"]
      tool_called: true

  - id: tu-002
    name: bash-list-files
    description: Agent uses bash to list files
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
