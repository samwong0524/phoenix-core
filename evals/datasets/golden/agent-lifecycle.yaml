# evals/datasets/golden/agent-lifecycle.yaml
# Golden Set: Agent Lifecycle Management
# 50 cases covering agent creation, role resolution, grouping, messaging, deletion
dataset_id: golden-agent-lifecycle-v1
size: 20
created: "2026-06-27"
category: agent_lifecycle

cases:
  # ── Agent Creation ──
  - id: lc-001
    name: basic-coordinator-creation
    description: Create a coordinator agent and verify it responds with management behavior
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: coordinator
          name: "Project Lead"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "The team needs to build a login page. Please plan the task breakdown."
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      response_not_empty: true
      response_mentions: ["task", "assign", "step", "plan", "work", "agent"]
      min_response_length: 50

  - id: lc-002
    name: specialist-creation
    description: Create a specialist agent and verify domain expertise in response
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: specialist
          name: "Database Expert"
        save: agent_id, group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "How should we design the user table schema for an e-commerce platform?"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      response_not_empty: true
      response_mentions: ["table", "schema", "column", "field", "index", "key", "user", "order"]
      min_response_length: 80

