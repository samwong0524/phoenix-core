  # ── Group Management ──
  - id: lc-012
    name: multi-agent-group
    description: Create a group with multiple agents and verify message delivery
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: coordinator
          name: "Lead"
        save: agent_a_id
      - action: create_agent
        params:
          role: worker
          name: "Worker 1"
        save: agent_b_id
      - action: create_group
        params:
          member_ids: ["{{human_agent_id}}", "{{agent_a_id}}", "{{agent_b_id}}"]
        save: group_id
      - action: send_message
        params:
          group_id: "{{group_id}}"
          message: "Both of you, please introduce yourselves"
      - action: get_messages
        params:
          group_id: "{{group_id}}"
        save: messages
    expected:
      agent_created: true
      response_not_empty: true
      min_message_count: 2

  - id: lc-013
    name: p2p-auto-group
    description: Creating agent auto-generates a P2P group
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: specialist
          name: "Solo Expert"
        save: agent_id, group_id
    expected:
      agent_created: true
      group_created: true

