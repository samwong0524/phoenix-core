      - action: create_agent
        params:
          role: worker
          name: "Worker"
        save: agent_b_id
      - action: create_agent
        params:
          role: specialist
          name: "Expert"
        save: agent_c_id
    expected:
      agent_created: true
      all_agents_unique: true

  - id: lc-017
    name: agent-with-creator-chain
    description: Sub-agent created by another agent (not human)
    steps:
      - action: create_workspace
        save: workspace_id, human_agent_id, assistant_agent_id, default_group_id
      - action: create_agent
        params:
          role: coordinator
          name: "Coordinator"
        save: coordinator_id
      - action: create_agent
        params:
          role: worker
          name: "Delegated Worker"
          creator_id: "{{coordinator_id}}"
        save: worker_id
    expected:
